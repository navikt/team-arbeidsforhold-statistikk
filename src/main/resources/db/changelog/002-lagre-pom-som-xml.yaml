databaseChangeLog:
  - changeSet:
      id: 002
      author: W175869
      changes:
        - createTable:
              tableName: pom
              columns:
                - column:
                    name: repo_full_name
                    type: VARCHAR(250)
                    constraints:
                      primaryKey: true
                - column:
                    name: path_in_repo
                    type: VARCHAR(250)
                    constraints:
                      primaryKey: true
                - column:
                    name: contents
                    type: xml
                - column:
                    name: last_commit_timestamp
                    type: timestamp with time zone
                - column:
                    name: last_fetch_timestamp
                    type: timestamp with time zone
        - addForeignKeyConstraint:
            baseTableName: pom
            baseColumnNames: repo_full_name
            referencedTableName: repo
            referencedColumnNames: full_name
            constraintName: fk_pom_repo_full_name

