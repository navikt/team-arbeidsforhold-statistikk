apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: team-arbeidsforhold-statistikk
  namespace: arbeidsforhold
  labels:
    team: arbeidsforhold
spec:
  ingresses:
    - https://team-arbeidsforhold-statistikk.dev.nav.cloud.nais.io
  port: 8080
  replicas:
    max: 2
    min: 1
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
  postgres:
    clusterName: arbeidsforhold-github-app
  envFrom:
    - secret: github-app
  azure:
    application:
      enabled: true
      allowAllUsers: false
      claims:
        groups:
          - id: "0000-GA-Team-Arbeidsforhold"
          - id: "0000-GA-JIRA-LG-IT_Team_Registre_Arbeid"
    sidecar:
      enabled: true
      autoLogin: true
