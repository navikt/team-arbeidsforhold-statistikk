apiVersion: data.nais.io/v1
kind: Postgres
metadata:
  name: arbeidsforhold-github-app
  namespace: arbeidsforhold
spec:
  cluster:
    majorVersion: "17"
    resources:
      cpu: 100m
      diskSize: 2Gi
      memory: 2G
    allowDeletion: false
    audit:
      enabled: false
    highAvailability: false
  database:
    collation: nb_NO
  maintenanceWindow:
    day: 7
    hour: 0
