spring:
  application:
    name: team-arbeidsforhold-statistikk
  datasource:
    url: jdbc:h2:mem:testdb
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog-master.yaml
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://ingen-for-test
app:
  client:
    id: local-test-client
  private-key: "Ikke brukt i test, vi mocker denne i TestKeysConfig"
  githubapp:
    id: 0
