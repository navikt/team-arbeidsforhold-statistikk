name: Build and deploy
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    name: Build, push and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for what-changed action
      - uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: maven
      - name: Bygg java
        run: mvn package
        env:
          GITHUB_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Determine what to do
        id: changed-files
        uses: "nais/what-changed@main"
        with:
          files: "src/main/**,pom.xml,.github/**"
      - name: Build and push image and SBOM to OCI registry
        if: steps.changed-files.outputs.changed != 'only-inputs'
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: arbeidsforhold
      - name: Deploy to Nais
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: src/kubernetes/naisapp.yaml
          WORKLOAD_IMAGE: ${{ steps.docker-build-push.outputs.image }}
